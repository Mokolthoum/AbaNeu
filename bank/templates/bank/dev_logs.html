{% extends "bank/base.html" %}
{% block title %}VulnBank - Dev Logs{% endblock %}
{% block page_title %}Development Logs{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="fas fa-bug me-2" style="color: var(--danger);"></i>Debug Logs
    </div>
    <div class="card-body">
        <div class="alert" style="background: rgba(239, 68, 68, 0.15); color: #fca5a5;">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <strong>SECURITY RISK:</strong> Debug logs are exposed to the public. This page should be restricted.
        </div>
        <pre style="background: #0d1117; color: #c9d1d9; padding: 1.5rem; border-radius: 8px; overflow-x: auto; max-height: 500px;">{{ log_content }}</pre>
    </div>
</div>
{% endblock %}
