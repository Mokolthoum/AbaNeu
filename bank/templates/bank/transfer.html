{% extends "bank/base.html" %}
{% block title %}VulnBank - Transfer{% endblock %}
{% block page_title %}Transfer Money{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        {% if message %}
        <div class="alert alert-success" style="background: rgba(16, 185, 129, 0.15); color: #6ee7b7;">
            <i class="fas fa-check-circle me-2"></i>{{ message }}
        </div>
        {% endif %}
        {% if error %}
        <div class="alert alert-danger" style="background: rgba(239, 68, 68, 0.15); color: #fca5a5;">
            <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <div class="card">
            <div class="card-header">
                <i class="fas fa-paper-plane me-2" style="color: var(--accent);"></i>Send Money
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/transfer/" id="transfer-form">
                    <div class="mb-3">
                        <label for="from_account" class="form-label">From Account</label>
                        <select class="form-select" id="from_account" name="from_account" required>
                            <option value="">Select your account</option>
                            {% for account in accounts %}
                            <option value="{{ account.id }}">
                                {{ account.account_number }} ({{ account.get_account_type_display }}) — ${{ account.balance|floatformat:2 }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="to_account_number" class="form-label">Recipient Account Number</label>
                        <input type="text" class="form-control" id="to_account_number" name="to_account_number"
                               placeholder="Enter recipient account number" required>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount ($)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" id="amount" name="amount"
                               placeholder="0.00" required>
                    </div>
                    <div class="mb-4">
                        <label for="description" class="form-label">Description (Optional)</label>
                        <textarea class="form-control" id="description" name="description" rows="2"
                                  placeholder="Payment description..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2" id="send-transfer-btn">
                        <i class="fas fa-paper-plane me-2"></i>Send Transfer
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
