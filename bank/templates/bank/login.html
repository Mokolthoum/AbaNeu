{% extends "bank/base.html" %}
{% block title %}VulnBank - Login{% endblock %}

{% block public_content %}
<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <div style="font-size: 3rem; color: var(--accent); margin-bottom: 0.5rem;">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h3 style="font-weight: 700; margin-bottom: 0.25rem;">VulnBank</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Sign in to your account</p>
        </div>

        {% if error %}
        <div class="alert alert-danger" style="background: rgba(239, 68, 68, 0.15); color: #fca5a5; font-size: 0.9rem;">
            <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login/">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text" style="background: #1a2332; border-color: var(--border-color); color: var(--text-secondary);">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Enter your username" required autocomplete="off">
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="background: #1a2332; border-color: var(--border-color); color: var(--text-secondary);">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2" id="login-btn">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
        </form>


    </div>
</div>
{% endblock %}
